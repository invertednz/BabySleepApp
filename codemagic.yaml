workflows:
  ios-release:
    name: iOS TestFlight Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Key
    triggering:
      events: []
      cancel_previous_builds: false
    environment:
      flutter: stable
      vars:
        BUNDLE_ID: "top.helptothe.babysteps"
        APP_STORE_APPLE_ID: "6761228765"
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          export CERTIFICATE_PRIVATE_KEY="$(cat $CM_BUILD_DIR/certs/apple_private_key.key)"
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd babysteps_app
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd babysteps_app
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build ipa
        script: |
          cd babysteps_app
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0) + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - babysteps_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - jamesfarrier@gmail.com
        notify:
          success: true
          failure: true
